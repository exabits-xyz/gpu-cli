version: 2

project_name: egpu

before:
  hooks:
    - go mod tidy

builds:
  - binary: egpu
    main: .
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/exabits-xyz/gpu-cli/cmd.Version={{.Version}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - id: egpu
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    files:
      - README.md
      - LICENSE

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

brews:
  - name: egpu
    repository:
      owner: exabits-xyz
      name: homebrew-gpu-cli-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    homepage: "https://github.com/exabits-xyz/gpu-cli"
    description: "Exabits GPU Cloud CLI"
    license: "MIT"
    install: |
      bin.install "egpu"
    test: |
      system "#{bin}/egpu", "--version"

release:
  github:
    owner: exabits-xyz
    name: gpu-cli
  draft: false
  prerelease: auto
  make_latest: true
